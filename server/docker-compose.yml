version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: trade_system_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: trade_system
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - trade_network

  redis:
    image: redis:7-alpine
    container_name: trade_system_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trade_network

  aktools:
    image: python:3.11-slim
    container_name: trade_system_aktools
    working_dir: /app
    command: >
      bash -c "pip install akshare aktools --quiet && python -m aktools --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    volumes:
      - aktools_cache:/root/.akshare
    networks:
      - trade_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
  redis_data:
  aktools_cache:

networks:
  trade_network:
    driver: bridge
